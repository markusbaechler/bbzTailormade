<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TM-App · bbz st.gallen</title>
  <script src="https://unpkg.com/@azure/msal-browser@3.28.1/lib/msal-browser.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css" />
  <style>
    /* ── Globale Font-Override ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; font-style: normal !important; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      margin: 0; padding: 0;
      font-family: 'Titillium Web', 'Segoe UI', Arial, sans-serif;
      font-size: 14px;
      background: #eef1f5;
      color: #1a2332;
    }

    /* ── Nav — weiss, Logo links, Tabs mit Unterstrich ─────────────────── */
    .tm-header {
      height: 52px;
      background: #ffffff;
      border-bottom: 1px solid rgba(0,0,0,0.12);
      display: flex;
      align-items: stretch;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .tm-header-left {
      padding: 0 14px;
      display: flex;
      align-items: center;
      border-right: 1px solid rgba(0,0,0,0.10);
      flex-shrink: 0;
    }
    .tm-logo-img {
      height: 26px;
      width: auto;
      display: block;
    }
    /* Altes bbz-Kästchen und App-Name ausblenden */
    .tm-logo, .tm-appname { display: none !important; }

    .tm-nav {
      display: flex;
      align-items: stretch;
      padding: 0 6px;
      gap: 0;
      flex: 1;
    }
    .tm-nav-btn {
      display: flex;
      align-items: center;
      padding: 0 15px;
      font-size: 13px;
      font-family: 'Titillium Web', sans-serif;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      color: #8896a5;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color 0.12s;
      margin-bottom: -1px;
    }
    .tm-nav-btn:hover { color: #4a5568; }
    .tm-nav-btn.active {
      color: #004078;
      border-bottom-color: #004078;
      font-weight: 700;
    }

    .tm-header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      margin-left: auto;
    }
    .tm-auth-status {
      font-size: 13px;
      color: #4a5568;
      font-weight: 600;
    }
    #btn-refresh {
      width: 30px; height: 30px;
      border-radius: 5px;
      border: 1px solid rgba(0,0,0,0.12);
      background: #fff;
      color: #4a5568;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── View Root — kein overflow-x ──────────────────────────────────── */
    .tm-view-root {
      height: calc(100vh - 52px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .tm-view-root > * { flex: 1; min-height: 0; overflow: hidden; }

    /* ── Global Message ───────────────────────────────────────────────── */
    .tm-global-message {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      border-bottom: 1px solid rgba(0,0,0,0.08);
    }
    .tm-global-message.success { background: #e1f5ee; color: #0f6e56; }
    .tm-global-message.error   { background: #FCEBEB; color: #A32D2D; }
    .tm-global-message.info    { background: #e6f1fb; color: #185FA5; }
  </style>
</head>
